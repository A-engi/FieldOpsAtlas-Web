<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Weather - FieldOps Atlas</title>
  <link rel="stylesheet" href="../../../shell.css?v=1.1.22-weather-nav" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="styles.css?v=1.0.0-weather-map-shell" />
</head>
<body class="weather-page">
  <main class="fieldops-shell-root weather-shell" data-page="weather" data-weather-provider="rainviewer">
    <section class="weather-stage" aria-label="Weather map">
      <div id="weatherMap" class="weather-map" aria-label="Filtered OSM map with weather overlay"></div>

      <nav class="weather-top-strip" aria-label="Weather providers">
        <a class="weather-provider-link is-active" href="index.html">Radar</a>
        <a class="weather-provider-link" href="openmeteo.html">Risk</a>
        <a class="weather-provider-link" href="metoffice.html">Met Office</a>
        <a class="weather-provider-link" href="ea-rainfall.html">EA rainfall</a>
        <a class="weather-provider-link" href="lightning.html">Lightning</a>
      </nav>

      <section class="weather-frame-strip" aria-label="Radar frame">
        <span id="radarFrameCount" class="weather-pill">0</span>
        <input id="radarFrameRange" class="weather-range" type="range" min="0" max="0" value="0" disabled />
        <span id="radarTimeLabel" class="weather-pill">Not loaded</span>
      </section>

      <section class="weather-dock" aria-live="polite">
        <div class="weather-dock__header">
          <div>
            <h1>RainViewer radar</h1>
            <p id="statusText" class="weather-status">Ready.</p>
          </div>
          <span class="weather-pill">OSM</span>
        </div>
        <div class="weather-actions">
          <button id="loadRadarButton" class="weather-button is-primary" type="button">Refresh</button>
          <a class="weather-button" href="../maps/index.html">Map</a>
        </div>
        <div class="weather-legend" aria-hidden="true"><span></span><span></span><span></span><span></span></div>
      </section>
    </section>
  </main>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="../../../shell.js?v=1.1.22-weather-nav" defer></script>
  <script src="weather-display-style.js?v=0.1.2" defer></script>
  <script src="app.js?v=1.0.0-weather-map-shell" defer></script>
  <script src="rainviewer.js?v=1.0.0-weather-map-shell" defer></script>
</body>
</html>
