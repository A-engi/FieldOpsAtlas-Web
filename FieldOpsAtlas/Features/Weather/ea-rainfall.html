<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>EA Rainfall - FieldOps Atlas</title>
  <link rel="stylesheet" href="../../../shell.css?v=1.1.22-weather-nav" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="styles.css?v=1.0.0-weather-map-shell" />
</head>
<body class="weather-page">
  <main class="fieldops-shell-root weather-shell" data-page="weather" data-weather-provider="ea-rainfall">
    <section class="weather-stage" aria-label="EA rainfall map">
      <div id="weatherMap" class="weather-map" aria-label="Filtered OSM map with rainfall gauges"></div>

      <section class="weather-dock" aria-live="polite">
        <div class="weather-dock__header">
          <div>
            <h1>EA rainfall</h1>
            <p id="statusText" class="weather-status">Ready.</p>
          </div>
          <span id="gaugeCount" class="weather-pill">0 gauges</span>
        </div>
        <div class="weather-field-grid">
          <label class="weather-label" for="siteSelect">
            Site
            <select id="siteSelect" class="weather-select"></select>
          </label>
          <label class="weather-label" for="distanceRange">
            Radius <span id="distanceLabel">40 km</span>
            <input id="distanceRange" class="weather-range" type="range" min="5" max="100" value="40" step="5" />
          </label>
        </div>
        <div class="weather-actions">
          <button id="clearGaugesButton" class="weather-button" type="button">Clear</button>
          <button id="loadGaugesButton" class="weather-button is-primary" type="button">Load</button>
        </div>
        <div id="gaugeList" class="weather-list"></div>
      </section>
    </section>
  </main>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="../../../shell.js?v=1.1.22-weather-nav" defer></script>
  <script src="weather-display-style.js?v=0.1.2" defer></script>
  <script src="weather-pages.js?v=0.1.0-shared-weather-shell" defer></script>
  <script src="weather-shell.js?v=0.1.0-shared-weather-shell" defer></script>
  <script src="app.js?v=1.0.0-weather-map-shell" defer></script>
  <script src="ea-rainfall.js?v=1.0.0-weather-map-shell" defer></script>
</body>
</html>
