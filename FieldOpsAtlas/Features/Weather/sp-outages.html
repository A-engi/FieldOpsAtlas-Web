<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta http-equiv="refresh" content="1;url=https://powercuts.spenergynetworks.co.uk/map" />
  <title>Opening SP Networks Power Cuts</title>

  <link rel="stylesheet" href="../../../shell.css?v=1.1.22-weather-nav" />
  <link rel="stylesheet" href="styles.css?v=1.0.0-weather-map-shell" />

  <style>
    .sp-launch-shell {
      min-height: 100dvh;
      display: grid;
      place-items: center;
      padding:
        calc(env(safe-area-inset-top) + 24px)
        18px
        calc(env(safe-area-inset-bottom) + 24px);
      background:
        radial-gradient(circle at 50% 34%, rgba(0, 158, 78, 0.18), transparent 34%),
        #07111c;
      color: #f4fbff;
    }

    .sp-launch-card {
      width: min(430px, 100%);
      display: grid;
      gap: 14px;
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 20px;
      padding: 20px;
      background: rgba(5, 14, 23, 0.92);
      box-shadow: 0 18px 48px rgba(0, 0, 0, 0.38);
      text-align: center;
    }

    .sp-launch-card h1,
    .sp-launch-card p {
      margin: 0;
    }

    .sp-launch-card h1 {
      font-size: 21px;
    }

    .sp-launch-card p {
      color: rgba(230, 243, 250, 0.72);
      font-size: 13px;
      line-height: 1.45;
    }

    .sp-launch-button,
    .sp-return-link {
      min-height: 46px;
      display: grid;
      place-items: center;
      border-radius: 13px;
      text-decoration: none;
      font-size: 13px;
      font-weight: 900;
    }

    .sp-launch-button {
      border: 1px solid rgba(0, 190, 94, 0.8);
      background: rgba(0, 158, 78, 0.24);
      color: #e5fff1;
    }

    .sp-return-link {
      border: 1px solid rgba(255, 255, 255, 0.14);
      background: rgba(255, 255, 255, 0.06);
      color: #eaf7ff;
    }

    .sp-launch-status {
      font-size: 11px !important;
    }
  </style>
</head>

<body>
  <main class="sp-launch-shell">
    <section class="sp-launch-card" aria-labelledby="spLaunchTitle">
      <h1 id="spLaunchTitle">SP Networks power cuts</h1>

      <p>
        Opening the official SP Networks map directly. Their website does not render
        reliably inside an embedded frame.
      </p>

      <a
        id="openSpMap"
        class="sp-launch-button"
        href="https://powercuts.spenergynetworks.co.uk/map"
      >
        Open official power cuts map
      </a>

      <a class="sp-return-link" href="outages.html">
        Return to FieldOps outage map
      </a>

      <p class="sp-launch-status">
        Redirecting automatically…
      </p>
    </section>
  </main>

  <script>
    window.setTimeout(() => {
      window.location.replace("https://powercuts.spenergynetworks.co.uk/map");
    }, 250);
  </script>
</body>
</html>
