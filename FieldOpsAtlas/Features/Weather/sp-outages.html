<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>SP Energy Networks Outages - FieldOps Atlas</title>

  <link rel="stylesheet" href="../../../shell.css?v=1.1.22-weather-nav" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="styles.css?v=1.0.0-weather-map-shell" />
  <link rel="stylesheet" href="sp-outages.css?v=0.3.0-live-spen" />
</head>

<body class="weather-page">
  <main
    class="fieldops-shell-root weather-shell sp-outage-shell"
    data-page="weather"
    data-weather-provider="sp-outages"
    data-version="0.3.0-live-spen"
  >
    <section class="weather-stage" aria-label="SP Energy Networks outage map">
      <div
        id="spOutageMap"
        class="weather-map"
        aria-label="Map of current SP Energy Networks power cuts"
      ></div>

      <section class="sp-outage-map-key" aria-label="SP outage map key">
        <span><i class="is-current"></i>Current</span>
        <span><i class="is-planned"></i>Planned</span>
        <span><i class="is-restored"></i>Restored</span>
      </section>

      <details class="weather-dock sp-outage-panel sp-outage-dock" open>
        <summary>
          <span class="sp-outage-summary-title">
            <strong>SP Energy Networks</strong>
            <small id="spHeadlineStatus">Loading live outage data</small>
          </span>

          <span class="sp-outage-summary-actions">
            <span id="spLivePill" class="weather-live-pill sp-outage-live-pill">Loading</span>
            <span class="sp-outage-summary-state" aria-hidden="true">Show</span>
          </span>
        </summary>

        <div class="sp-outage-panel-body">
          <div class="weather-metrics sp-outage-metrics" aria-label="SP outage counts">
            <div class="weather-metric">
              <span id="spCurrentCount">-</span>
              <small>Current</small>
            </div>
            <div class="weather-metric">
              <span id="spPlannedCount">-</span>
              <small>Planned</small>
            </div>
            <div class="weather-metric">
              <span id="spRestoredCount">-</span>
              <small>Restored</small>
            </div>
          </div>

          <div class="sp-outage-actions">
            <button id="refreshSpOutages" class="weather-button is-primary" type="button">
              Refresh
            </button>
            <a
              class="weather-button sp-outage-official-link"
              href="https://powercuts.spenergynetworks.co.uk/map"
              rel="noopener"
              target="_blank"
            >
              Official map
            </a>
          </div>

          <div id="spIncidentList" class="sp-outage-list" aria-live="polite"></div>

          <p id="spOutageNote" class="sp-outage-note">
            Points are plotted from SPEN incident postcodes collected into this repo.
          </p>
        </div>
      </details>
    </section>
  </main>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="../../../shell.js?v=1.1.22-weather-nav" defer></script>
  <script src="weather-display-style.js?v=0.1.2" defer></script>
  <script src="weather-pages.js?v=0.1.0-shared-weather-shell" defer></script>
  <script src="weather-shell.js?v=0.1.0-shared-weather-shell" defer></script>
  <script src="sp-outages.js?v=0.3.0-live-spen" defer></script>
</body>
</html>
