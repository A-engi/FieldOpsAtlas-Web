<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>FieldOps Atlas RF Settings v1.1.63</title>
  <link rel="stylesheet" href="../../../shell.css?v=1.1.12-single-rf-doc" />
  <link rel="stylesheet" href="../RF/background.css?v=1.1.60-visible-services-row" />
  <link rel="stylesheet" href="../RF/page.css?v=1.1.63-rfpages-adopt-rf-background" />
</head>
<body>
  <main class="phone" data-page="settings" data-nav="rf" data-version="1.1.63">
    <section class="content-canvas" aria-label="FieldOps Atlas RF Settings content">
      <article class="page-content">
        <header class="page-head">
          <div class="page-kicker">Display</div>
          <h1 class="page-title">Settings</h1>
          <p class="page-lede">Prototype RF display settings and page preferences.</p>
        </header>

      <section class="card" aria-labelledby="settingsListTitle">
        <h2 class="card-title" id="settingsListTitle">Settings</h2>
        <div class="list">
          <a class="list-row" href="../RF/index.html">
            <span class="row-icon">MAP</span>
            <span>
              <b class="row-title">Map display</b>
              <span class="row-sub">Return to the RF network map</span>
            </span>
            <span class="status">Open</span>
          </a>
          <a class="list-row" href="./paths.html">
            <span class="row-icon">RF</span>
            <span>
              <b class="row-title">Path overlay</b>
              <span class="row-sub">Route and selected path settings</span>
            </span>
            <span class="status">Demo</span>
          </a>
          <a class="list-row" href="./services.html">
            <span class="row-icon">SRV</span>
            <span>
              <b class="row-title">Service filters</b>
              <span class="row-sub">DTT, DAB, FM layer shortcuts</span>
            </span>
            <span class="status">Demo</span>
          </a>
        </div>
      </section>
      <section class="card" aria-labelledby="settingsActionsTitle">
        <h2 class="card-title" id="settingsActionsTitle">Shortcuts</h2>
        <div class="action-grid">
          <a class="action-card" href="../RF/index.html">
            <span class="action-icon" aria-hidden="true">RF</span>
            <strong>RF map</strong>
          </a>
          <a class="action-card" href="./sites.html">
            <span class="action-icon" aria-hidden="true">SITE</span>
            <strong>Sites</strong>
          </a>
        </div>
      </section>
      </article>
    </section>
  </main>

  <script src="../../../shell.js?v=1.1.12-single-rf-doc" defer></script>
</body>
</html>
