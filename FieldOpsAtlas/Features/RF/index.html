<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>FieldOps Atlas RF selected path scene</title>

  <link rel="stylesheet" href="../../../shell.css?v=1.1.21-shell-smoke-controls">
  <link rel="stylesheet" href="./background.css?v=1.1.76-graph-label">
  <link rel="stylesheet" href="./rf-interface.css?v=1.1.121-scene-selector">

  <style>
    .rf-load-toast {
      position: fixed;
      z-index: 9999;
      left: 14px;
      bottom: 92px;
      width: auto;
      max-width: min(86vw, 380px);
      padding: 7px 9px;
      border: 1px solid rgba(255, 221, 142, 0.66);
      border-radius: 13px;
      background: rgba(10, 23, 36, 0.88);
      color: #ffe7b8;
      box-shadow: 0 10px 26px rgba(0, 0, 0, 0.26);
      font: 700 10px/1.18 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      white-space: pre-wrap;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.25s ease, transform 0.25s ease;
      pointer-events: none;
    }
    .rf-load-toast.is-visible { opacity: 0.9; transform: translateY(0); }
  </style>
</head>
<body>
  <main class="phone" data-page="rf" data-nav="rf" data-version="1.7.4-pitch-only-high-camera" data-rf-scene-default="mount-a_b-comp-scene">
    <section class="content-canvas" aria-label="RF Atlas content">
      <article class="rf-home" data-rf-interface-root></article>
    </section>
  </main>

  <script>
    window.FieldOpsSearchQueue = window.FieldOpsSearchQueue || [];
    window.FieldOpsSearchQueue.push({
      page: "rf",
      label: "RF",
      placeholder: "Search RF...",
      emptyText: "No RF matches found.",
      items: [
        { id: "rf-overview", title: "RF overview", subtitle: "RF graph and dashboard", href: "./index.html", keywords: ["overview", "dashboard", "rf graph", "graph", "map"] },
        { id: "rf-sites", title: "Sites", subtitle: "RF site directory and status", href: "../RFPages/sites.html", keywords: ["site", "sites", "transmitter", "relay", "tx"] },
        { id: "rf-paths", title: "Paths", subtitle: "RF paths and link analysis", href: "../RFPages/paths.html", keywords: ["path", "paths", "link", "links", "microwave", "frequency"] },
        { id: "rf-equipment", title: "Equipment", subtitle: "Transmitters, antennas, receivers", href: "../RFPages/equipment.html", keywords: ["equipment", "tx", "antenna", "receiver", "rack"] },
        { id: "rf-dtt", title: "DTT services", subtitle: "Digital terrestrial television", href: "../RFPages/dtt.html", keywords: ["dtt", "mux", "multiplex", "television", "tv"] },
        { id: "rf-dab", title: "DAB services", subtitle: "Digital audio broadcasting", href: "../RFPages/dab.html", keywords: ["dab", "radio", "audio", "ensemble"] },
        { id: "rf-fm", title: "FM services", subtitle: "FM radio services", href: "../RFPages/fm.html", keywords: ["fm", "radio", "audio"] },
        { id: "rf-services", title: "All RF services", subtitle: "DTT, DAB, FM and service groups", href: "../RFPages/services.html", keywords: ["services", "more", "dtt", "dab", "fm"] },
        { id: "site-1", title: "Site 1", subtitle: "Generic demo RF site", href: "../RFPages/sites.html#site-1", keywords: ["site", "site 1", "demo", "tx"] },
        { id: "site-2", title: "Site 2", subtitle: "Generic demo RF site", href: "../RFPages/sites.html#site-2", keywords: ["site", "site 2", "demo", "rx"] },
        { id: "site-3", title: "Site 3", subtitle: "Generic demo RF site", href: "../RFPages/sites.html#site-3", keywords: ["site", "site 3", "demo", "relay"] }
      ]
    });
  </script>

  <script src="../../../shell.js?v=1.1.20-web-repo-profile-link" defer></script>
  <script src="./rf-interface.js?v=1.1.123-scene-selector" defer></script>
  <script src="./rf-path-builder.js?v=1.2.0-cluster-default-path" defer></script>
  <script src="./3d-render.js?v=1.6.4-bidirectional-side-tilt" defer></script>
  <script src="./3D Graphics/river-scene.js?v=1.6.6-pitch-only-high-camera" defer></script>
  <script src="./graph-builder.js?v=1.7.0-selected-path-binding" defer></script>

  <script>
    (() => {
      "use strict";
      const PAGE_VERSION = "1.7.4-pitch-only-high-camera";
      const TOAST_ID = "rfLoadToast";
      const versionOf = globalName => window[globalName]?.VERSION || window[globalName]?.version || "missing";
      function showToast() {
        document.getElementById(TOAST_ID)?.remove();
        const toast = document.createElement("div");
        toast.id = TOAST_ID;
        toast.className = "rf-load-toast";
        toast.setAttribute("role", "status");
        toast.setAttribute("aria-live", "polite");
        toast.textContent = [
          `index.html ${PAGE_VERSION}`,
          `3d-render.js ${versionOf("FieldOps3DRenderer")}`,
          `graph-builder.js ${versionOf("FieldOpsGraphBuilder")}`,
          `path ${document.querySelector("[data-rf-graph]")?.dataset.rfPathId || "loading"}`,
          `scene ${document.querySelector("[data-rf-graph]")?.dataset.rfScene || "loading"}`
        ].join("\n");
        document.body.appendChild(toast);
        requestAnimationFrame(() => toast.classList.add("is-visible"));
        setTimeout(() => toast.classList.remove("is-visible"), 6500);
        setTimeout(() => toast.remove(), 7000);
      }
      document.readyState === "loading"
        ? document.addEventListener("DOMContentLoaded", () => setTimeout(showToast, 650), { once: true })
        : setTimeout(showToast, 650);
    })();
  </script>
</body>
</html>
