<!doctype html>
<html lang="en">
<head>
 <meta charset="utf-8">
 <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
 <title>Maps</title>
 <link rel="stylesheet" href="../../../shell.css">
 <link rel="stylesheet" href="./background.css?v=fade-restore-20260612g">
 <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
 <link rel="stylesheet" href="./OSMmaps.css?v=fade-restore-20260612g">
 <link rel="stylesheet" href="./OSMpanes.css?v=fade-restore-20260612g">
 <style>
  .osmmaps-weather-button {
   position: fixed;
   top: calc(96px + env(safe-area-inset-top, 0px));
   right: max(12px, calc((100vw - min(100vw, var(--page-width, 430px))) / 2 + 12px));
   z-index: 34;
   min-height: 36px;
   display: inline-flex;
   align-items: center;
   justify-content: center;
   padding: 0 12px;
   border: 1px solid rgba(184, 226, 255, 0.18);
   border-radius: 999px;
   color: rgba(239, 249, 255, 0.94);
   background:
    radial-gradient(circle at 50% 0%, rgba(121, 198, 255, 0.14), transparent 46%),
    linear-gradient(180deg, rgba(22, 68, 116, 0.62), rgba(6, 24, 48, 0.68));
   box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.12), 0 12px 24px rgba(0, 14, 32, 0.18);
   font: inherit;
   font-size: 13px;
   font-weight: 850;
   text-decoration: none;
   pointer-events: auto;
  }
 </style>
</head>
<body>
 <div class="fieldops-shell-root" data-page="map"></div>

 <main class="osmmaps-page" data-osmmaps-page>
  <div id="OSMmaps" class="osmmaps-canvas" aria-label="UK walk marker map"></div>

  <a
   class="osmmaps-weather-button"
   href="../Weather/index.html"
   data-map-weather-button
   aria-label="Open Weather"
  >Weather</a>

  <section class="osmmaps-region-overlay" data-region-overlay hidden aria-label="Choose map region">
   <button class="osmmaps-overlay-backdrop" type="button" data-region-overlay-close aria-label="Close region chooser"></button>

   <article class="osmmaps-filter-card" aria-label="Map region filter">
    <header class="osmmaps-filter-header">
     <div>
      <p class="osmmaps-kicker">Filter</p>
      <h1>Choose region</h1>
     </div>

     <button class="osmmaps-small-button" type="button" data-region-overlay-close>Close</button>
    </header>

    <p class="osmmaps-filter-note">
     Only the selected region's walks are loaded.
    </p>

    <div class="osmmaps-region-list" data-region-list></div>
   </article>
  </section>

  <section class="osmpanes-details" data-selected-panel hidden aria-live="polite"></section>
 </main>

 <div class="background-item" aria-hidden="true">
  <div class="atlas-top-fade"></div>
  <div class="atlas-top-fade atlas-bottom-fade"></div>
 </div>

 <script src="../../../shell.js?v=fade-restore-20260612g"></script>
 <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
 <script src="./OSMpanes.js?v=fade-restore-20260612g"></script>
 <script src="./OSMmaps.js?v=fade-restore-20260612g"></script>
</body>
</html>
<!-- End of FieldOpsAtlas/Features/maps/index.html | bottom/end of file -->
