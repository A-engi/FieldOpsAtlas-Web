name: Update electricity outage data

on:
  workflow_dispatch:
  schedule:
    - cron: "*/15 * * * *"
  push:
    paths:
      - ".github/workflows/update-outages.yml"
      - "scripts/collect-outages.mjs"

permissions:
  contents: write

concurrency:
  group: update-electricity-outages
  cancel-in-progress: true

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      ENWL_ODS_API_KEY: ${{ secrets.ENWL_ODS_API_KEY }}
      SPEN_ODS_API_KEY: ${{ secrets.SPEN_ODS_API_KEY }}
      NIE_ODS_API_KEY: ${{ secrets.NIE_ODS_API_KEY }}
      OUTAGE_DEBUG_HTTP: ${{ vars.OUTAGE_DEBUG_HTTP }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Validate collector
        run: node scripts/collect-outages.mjs --self-test

      - name: Optional network diagnostics
        if: ${{ vars.OUTAGE_DEBUG_HTTP == 'true' }}
        shell: bash
        run: |
          echo "Runner egress IP:"
          curl -fsSL https://api.ipify.org || true
          echo

      - name: Collect official outage feeds
        env:
          NODE_TLS_REJECT_UNAUTHORIZED: "0"
        run: node scripts/collect-outages.mjs

      - name: Commit updated outage data
        shell: bash
        run: |
          git config user.name "fieldops-outage-bot"
          git config user.email "actions@users.noreply.github.com"

          if ! node -e "const fs=require('fs'); const s=JSON.parse(fs.readFileSync('FieldOpsAtlas/Features/Weather/data/outages/status.json','utf8')); const bad=Object.entries(s.providers || {}).filter(([, provider]) => provider.state !== 'live'); if (bad.length) { console.log('Not committing non-live provider refresh:', bad.map(([id, provider]) => id + '=' + provider.state).join(', ')); process.exit(1); }"; then
            exit 0
          fi

          git add FieldOpsAtlas/Features/Weather/data/outages

          if git diff --cached --quiet; then
            echo "No outage-data changes to commit."
            exit 0
          fi

          git commit -m "data: refresh electricity outages"
          git push
